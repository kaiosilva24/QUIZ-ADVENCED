<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>frontend</title>

    <!-- flag-icons: carrega de forma NÃO-BLOQUEANTE (não trava o FCP) -->
    <link rel="preload" as="style"
      href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css"
      onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css">
    </noscript>
    <script type="module" crossorigin src="/assets/index-BXsP97ss.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/rolldown-runtime-Dw2cE7zH.js">
    <link rel="modulepreload" crossorigin href="/assets/react-Cee4NTdL.js">
    <link rel="stylesheet" crossorigin href="/assets/index-CxoCcxZq.css">
  </head>
  <body>
    <div id="root">
      <style>
        body { margin: 0; background-color: #020617; }
        .global-loader { display: flex; align-items: center; justify-content: center; height: 100vh; width: 100%; flex-direction: column; gap: 1rem; font-family: sans-serif; }
        .global-spinner { width: 40px; height: 40px; border: 4px solid rgba(99, 102, 241, 0.2); border-top-color: #6366f1; border-radius: 50%; animation: globalSpin 1s linear infinite; }
        @keyframes globalSpin { to { transform: rotate(360deg); } }
      </style>
      <div class="global-loader">
        <div class="global-spinner"></div>
      </div>
    </div>
    <script>
      // Prefetch da API do quiz enquanto o bundle JS ainda está carregando
      // Funciona para quiz com slug E para A/B roundrobin (URL raiz /)
      (function() {
        try {
          var slug = location.pathname.replace(/^\//, '').replace(/\/.*$/, '');
          if (slug && slug !== 'admin') {
            // Tem slug: busca direto o /fast
            var url = '/api/route/' + encodeURIComponent(slug) + '/fast';
            window.__QUIZ_PREFETCH__ = fetch(url).then(function(r) {
              return r.ok ? r.json() : null;
            }).catch(function() { return null; });
          } else if (!slug || slug === '') {
            // URL raiz (A/B roundrobin): pega o quiz_id primeiro, depois busca /fast
            window.__QUIZ_PREFETCH__ = fetch('/api/roundrobin/next')
              .then(function(r) { return r.ok ? r.json() : null; })
              .then(function(rr) {
                if (!rr || !rr.quiz_id) return null;
                return fetch('/api/route/quiz-' + rr.quiz_id + '/fast')
                  .then(function(r) { return r.ok ? r.json() : null; })
                  .catch(function() { return null; });
              })
              .catch(function() { return null; });
          }
        } catch(e) {}
      })();
    </script>
  </body>
</html>
